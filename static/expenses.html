<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            console.error("Global error:", msg, url, line);
            // alert("JS Error: " + msg + " at " + line);
        };
        </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Expenses - Vault</title>
    <meta name="theme-color" content="#0E0E0E">

    <!-- Icons -->
    <link rel="icon" href="/static/pficon.png">
    <link rel="apple-touch-icon" href="/static/pficon.png">
    <link rel="manifest" href="/static/site.webmanifest">

    <!-- Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vault">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Vault Theme -->
    <link rel="stylesheet" href="/static/styles/vault-theme.css?v=1777669514">
</head>
<body>
    <nav-bar></nav-bar>
    <toast-container></toast-container>

    <div class="container py-2">
        <div class="d-flex align-items-center justify-content-end mb-1">
            <button class="btn btn-link" id="exportBtn" aria-label="Export" style="color: var(--on-surface-variant);">
                <span class="material-symbols-outlined">download</span>
            </button>
        </div>

        <date-navigation></date-navigation>
        <category-chart></category-chart>

        <!-- Latest Expenses Widget -->
        <div class="mt-4">
            <latest-expenses period="all"></latest-expenses>
        </div>
    </div>

    <!-- Core Modules -->
    <script type="module" src="/static/components/config.js"></script>
    <script type="module" src="/static/components/api-service.js"></script>
    <script type="module" src="/static/components/event-manager.js"></script>

    <!-- Custom Components -->
    <script src="/static/components/navbar.js"></script>
    <script type="module" src="/static/components/toast.js"></script>
    <script type="module" src="/static/components/date-navigation.js"></script>
    <script type="module" src="/static/components/category-chart.js"></script>
    <script type="module" src="/static/components/latest-expenses.js"></script>

    <script>
        // Export button
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('exportBtn').addEventListener('click', async function () {
                try {
                    const res = await fetch('/api/backup/download');
                    if (!res.ok) throw new Error('Failed');
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'expenses_backup.csv';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    window.showToast('Download started', 'success');
                } catch (e) {
                    window.showToast('Download failed', 'error');
                }
            });
        });
    </script>
</body>
</html>
