<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>View Expenses - Personal Finances</title>

    <!-- Icons -->
    <link rel="icon" href="/static/pficon.png">
    <link rel="apple-touch-icon" href="/static/pficon.png">
    <link rel="manifest" href="/static/site.webmanifest">

    <!-- Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expenses">
    <meta name="application-name" content="Expenses">
    <meta name="theme-color" content="#007AFF">
    <meta name="msapplication-TileColor" content="#007AFF">
    <meta name="msapplication-TileImage" content="/static/pficon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/styles/theme.css">
</head>

<body>
    <nav-bar></nav-bar>
    <toast-container></toast-container>

    <div class="container py-2">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">

                <div class="d-flex align-items-center justify-content-end mb-1">
                    <button class="btn btn-link text-muted p-1" id="exportBtn" aria-label="Export">
                        <i class="bi bi-download fs-5"></i>
                    </button>
                </div>

                <date-navigation></date-navigation>
                <category-chart></category-chart>

                <!-- Latest Expenses Widget -->
                <div class="mt-4">
                    <latest-expenses period="all"></latest-expenses>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Core Modules -->
    <script type="module" src="/static/components/config.js"></script>
    <script type="module" src="/static/components/api-service.js"></script>
    <script type="module" src="/static/components/event-manager.js"></script>

    <!-- Custom Components -->
    <script src="/static/components/navbar.js"></script>
    <script src="/static/components/toast.js"></script>
    <script src="/static/components/date-navigation.js"></script>
    <script type="module" src="/static/components/category-chart.js"></script>
    <script type="module" src="/static/components/latest-expenses.js"></script>

    <script>
        // Dark mode initialization - run immediately
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');

            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
        })();

        // Dark mode toggle functionality
        function initDarkMode() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);

            // Update chart colors if needed - find the category-chart element
            const categoryChart = document.querySelector('category-chart');
            if (categoryChart && categoryChart.chart) {
                categoryChart.chart.update();
            }
        }

        // Initialize dark mode on page load
        document.addEventListener('DOMContentLoaded', initDarkMode);

        // Export button
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('exportBtn').addEventListener('click', async function () {
                try {
                    const res = await fetch('/api/backup/download');
                    if (!res.ok) throw new Error('Failed');
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'expenses_backup.csv';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    window.showToast('Download started', 'success');
                } catch (e) {
                    window.showToast('Download failed', 'error');
                }
            });
        });
    </script>
</body>

</html>
