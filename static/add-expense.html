<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Add Expense - Vault</title>
    <meta name="theme-color" content="#0E0E0E">

    <!-- Icons -->
    <link rel="icon" href="/static/pficon.png">
    <link rel="apple-touch-icon" href="/static/pficon.png">
    <link rel="manifest" href="/static/site.webmanifest">

    <!-- Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vault">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Vault Theme -->
    <link rel="stylesheet" href="/static/styles/vault-theme.css">
</head>
<body>
    <nav-bar></nav-bar>
    <toast-container></toast-container>

    <div class="container py-4">
        <!-- Add Expense Form -->
        <div class="modern-card chart-container-modern">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center mb-3"
                    style="width: 60px; height: 60px; background: var(--primary-gradient); border-radius: 50%;">
                    <span class="material-symbols-outlined text-white" style="font-size: 1.75rem; color: var(--on-primary);">add</span>
                </div>
                <h4 class="chart-title-modern mb-0 font-headline" id="formTitle">Add New Expense</h4>
                <p class="text-muted" style="font-size: 0.875rem;" id="formSubtitle">Track your spending easily</p>
            </div>
            <div class="form-modern">
                <add-expense-form></add-expense-form>
            </div>
        </div>

        <!-- Success State (hidden by default) -->
        <div id="successCard" class="modern-card chart-container-modern mt-4 d-none">
            <div class="text-center">
                <div class="d-inline-flex align-items-center justify-content-center mb-3"
                    style="width: 80px; height: 80px; background: var(--success-gradient); border-radius: 50%;">
                    <span class="material-symbols-outlined" style="font-size: 2.5rem; color: white;">check</span>
                </div>
                <h5 class="text-success mb-3">Expense Added Successfully!</h5>
                <div id="expenseDetails" class="mb-4"></div>
                <div class="d-grid gap-3">
                    <button id="addAnotherBtn" class="btn-modern btn-modern-primary">
                        <span class="material-symbols-outlined me-2" style="font-size: 1.25rem;">add_circle</span>Add Another Expense
                    </button>
                    <a href="/expenses" class="btn-modern btn-modern-secondary text-center" style="text-decoration: none;">
                        <span class="material-symbols-outlined me-2" style="font-size: 1.25rem;">payments</span>View All Expenses
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Modules -->
    <script type="module" src="/static/components/config.js"></script>
    <script type="module" src="/static/components/api-service.js"></script>
    <script type="module" src="/static/components/event-manager.js"></script>

    <!-- Custom Components -->
    <script src="/static/components/navbar.js"></script>
    <script src="/static/components/toast.js"></script>
    <script type="module" src="/static/components/add-expense-form.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const addAnotherBtn = document.getElementById('addAnotherBtn');
            addAnotherBtn.addEventListener('click', function () {
                document.getElementById('successCard').classList.add('d-none');
                document.querySelector('add-expense-form').resetForm();
                document.querySelector('.modern-card').scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
